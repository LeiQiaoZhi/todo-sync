<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=2026-03-16-1054" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="topbar-main">
          <p id="buildVersion" class="build-version">
            Version 2026-03-16 10:54 | Fix mobile first-row task alignment
          </p>
          <p id="statusText" class="status-text">Add your GitHub settings to connect this app.</p>
        </div>
        <div class="topbar-actions">
          <span id="syncBadge" class="badge badge-muted">Idle</span>
          <button
            id="toggleThemeButton"
            class="icon-button topbar-icon-button theme-button"
            type="button"
            aria-label="Switch theme"
            title="Switch theme"
          >
            ◐
          </button>
          <button
            id="refreshButton"
            class="icon-button topbar-icon-button sync-button"
            type="button"
            aria-label="Sync now"
            title="Sync now"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24" class="topbar-icon-svg">
              <path
                d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.9"
              />
            </svg>
          </button>
          <button
            id="toggleSettingsButton"
            class="icon-button topbar-icon-button settings-toggle"
            type="button"
            aria-label="GitHub settings"
            title="GitHub settings"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24" class="topbar-icon-svg">
              <path
                d="M12 8.5a3.5 3.5 0 1 1 0 7a3.5 3.5 0 0 1 0-7Zm7 3.5l2 1l-2 1a7.9 7.9 0 0 1-.7 1.7l.9 2.1l-2.3 1.3l-1.6-1.5a8.1 8.1 0 0 1-1.9.8L13 22h-2l-.4-2.2a8.1 8.1 0 0 1-1.9-.8l-1.6 1.5l-2.3-1.3l.9-2.1A7.9 7.9 0 0 1 5 14l-2-1l2-1a7.9 7.9 0 0 1 .7-1.7l-.9-2.1l2.3-1.3l1.6 1.5a8.1 8.1 0 0 1 1.9-.8L11 2h2l.4 2.2a8.1 8.1 0 0 1 1.9.8l1.6-1.5l2.3 1.3l-.9 2.1c.31.53.55 1.1.7 1.7Z"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.55"
              />
            </svg>
          </button>
        </div>
      </section>

      <section id="settingsPanel" class="panel">
        <div class="panel-header">
          <h2>GitHub Settings</h2>
          <span id="configBadge" class="badge badge-muted">Not configured</span>
        </div>

        <form id="settingsForm" class="settings-grid">
          <label>
            GitHub owner
            <input id="ownerInput" name="owner" type="text" placeholder="your-username" required />
          </label>

          <label>
            Repository name
            <input id="repoInput" name="repo" type="text" placeholder="todo-app" required />
          </label>

          <label>
            Branch
            <input id="branchInput" name="branch" type="text" placeholder="main" value="main" required />
          </label>

          <label class="settings-span">
            Personal access token
            <input
              id="tokenInput"
              name="token"
              type="password"
              placeholder="github_pat_..."
              autocomplete="off"
              required
            />
          </label>

          <div class="settings-actions settings-span">
            <button class="primary-button" type="submit">Save and Connect</button>
            <button id="clearButton" class="ghost-button" type="button">Clear Saved Settings</button>
          </div>
        </form>
      </section>

      <section class="panel todo-panel">
        <form id="todoForm" class="todo-entry">
          <input
            id="todoInput"
            type="text"
            maxlength="200"
            placeholder="What needs to get done?"
            autocomplete="off"
          />
          <div class="todo-entry-side">
            <div class="entry-date-shell">
              <span id="todoDateButton" class="ghost-button entry-date-button" aria-hidden="true">Date</span>
              <input id="todoDateInput" class="entry-date-native-input" type="date" aria-label="Due date" />
            </div>
          </div>
          <button class="primary-button" type="submit">Add Todo</button>
        </form>

        <div class="todo-sections">
          <section class="todo-group todo-group-progress">
            <button
              id="progressToggleButton"
              class="todo-group-header todo-group-toggle"
              type="button"
              aria-expanded="true"
            >
              <h2>Progress</h2>
              <span id="progressCount" class="group-count">0</span>
            </button>
            <ul id="progressList" class="todo-list" aria-live="polite"></ul>
          </section>

          <section class="todo-group todo-group-backlog">
            <button
              id="backlogToggleButton"
              class="todo-group-header todo-group-toggle"
              type="button"
              aria-expanded="true"
            >
              <h2>Backlog</h2>
              <span id="backlogCount" class="group-count">0</span>
            </button>
            <ul id="backlogList" class="todo-list" aria-live="polite"></ul>
          </section>

          <section class="todo-group todo-group-done">
            <button id="doneToggleButton" class="done-toggle" type="button" aria-expanded="false">
              <span>Done</span>
              <div class="done-toggle-meta">
                <span id="doneCount" class="group-count">0</span>
              </div>
            </button>
            <ul id="doneList" class="todo-list" aria-live="polite" hidden></ul>
          </section>
        </div>
        <p id="emptyState" class="empty-state">No todos yet.</p>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <div class="todo-main">
          <p class="todo-text"></p>
          <textarea
            class="todo-text-editor"
            rows="1"
            maxlength="200"
            aria-label="Edit task text"
            hidden
          ></textarea>
          <div class="todo-meta-row">
            <input class="due-date-input date-input inline-date-input due-date-widget" type="date" aria-label="Edit due date" />
            <button class="due-date-display" type="button" hidden></button>
            <div class="status-control" role="group" aria-label="Task section">
              <button class="status-option" data-status="progress" type="button">Progress</button>
              <button class="status-option" data-status="backlog" type="button">Backlog</button>
              <button class="status-option" data-status="done" type="button">Done</button>
            </div>
          </div>
        </div>
        <div class="todo-actions">
          <button class="icon-button delete-button" type="button" aria-label="Delete todo">×</button>
          <button class="delete-confirm-button" type="button" hidden>Confirm</button>
        </div>
      </li>
    </template>

  <script src="app.js?v=2026-03-16-1054"></script>
</body>
</html>
