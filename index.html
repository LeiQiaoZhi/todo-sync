<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Todo Sync 2026-03-15 14:28 | Add theme toggle and softer dark mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=2026-03-15-1428" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="topbar-main">
          <p id="buildVersion" class="build-version">
            Version 2026-03-15 14:28 | Add theme toggle and softer dark mode
          </p>
          <p id="statusText" class="status-text">Add your GitHub settings to connect this app.</p>
        </div>
        <div class="topbar-actions">
          <span id="syncBadge" class="badge badge-muted">Idle</span>
          <button
            id="toggleThemeButton"
            class="icon-button theme-button"
            type="button"
            aria-label="Switch theme"
            title="Switch theme"
          >
            ◐
          </button>
          <button
            id="refreshButton"
            class="icon-button sync-button"
            type="button"
            aria-label="Sync now"
            title="Sync now"
          >
            ↻
          </button>
          <button
            id="toggleSettingsButton"
            class="settings-toggle"
            type="button"
            aria-label="GitHub settings"
            title="GitHub settings"
          >
            <span aria-hidden="true">⚙</span>
          </button>
        </div>
      </section>

      <section id="settingsPanel" class="panel">
        <div class="panel-header">
          <h2>GitHub Settings</h2>
          <span id="configBadge" class="badge badge-muted">Not configured</span>
        </div>

        <form id="settingsForm" class="settings-grid">
          <label>
            GitHub owner
            <input id="ownerInput" name="owner" type="text" placeholder="your-username" required />
          </label>

          <label>
            Repository name
            <input id="repoInput" name="repo" type="text" placeholder="todo-app" required />
          </label>

          <label>
            Branch
            <input id="branchInput" name="branch" type="text" placeholder="main" value="main" required />
          </label>

          <label class="settings-span">
            Personal access token
            <input
              id="tokenInput"
              name="token"
              type="password"
              placeholder="github_pat_..."
              autocomplete="off"
              required
            />
          </label>

          <div class="settings-actions settings-span">
            <button class="primary-button" type="submit">Save and Connect</button>
            <button id="clearButton" class="ghost-button" type="button">Clear Saved Settings</button>
          </div>
        </form>
      </section>

      <section class="panel todo-panel">
        <form id="todoForm" class="todo-entry">
          <input
            id="todoInput"
            type="text"
            maxlength="200"
            placeholder="What needs to get done?"
            autocomplete="off"
          />
          <div class="todo-entry-side">
            <input id="todoDateInput" class="date-input" type="date" aria-label="Due date" />
            <button
              id="clearTodoDateButton"
              class="icon-button clear-date-button"
              type="button"
              aria-label="Clear due date"
              hidden
            >
              ×
            </button>
          </div>
          <button class="primary-button" type="submit">Add Todo</button>
        </form>

        <ul id="todoList" class="todo-list" aria-live="polite"></ul>
        <p id="emptyState" class="empty-state">No todos yet.</p>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <div class="todo-main">
          <label class="todo-checkline">
            <input class="todo-checkbox" type="checkbox" />
            <span class="todo-text"></span>
          </label>
          <div class="todo-meta-row">
            <button class="due-button" type="button"></button>
            <div class="due-editor" hidden>
              <input class="due-date-input date-input" type="date" aria-label="Edit due date" />
              <button class="ghost-button clear-due-button" type="button">Clear</button>
            </div>
          </div>
        </div>
        <div class="todo-actions">
          <button class="icon-button delete-button" type="button" aria-label="Delete todo">×</button>
        </div>
      </li>
    </template>

    <script src="app.js?v=2026-03-15-1428"></script>
  </body>
</html>
